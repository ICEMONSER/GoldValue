<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมคำนวณราคาทองคำ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://i.ibb.co/dH9BrtY/Gemini-Generated-Image-mr0ej3mr0ej3mr0e.png">
    
    <link rel="apple-touch-icon" href="https://i.ibb.co/dH9BrtY/Gemini-Generated-Image-mr0ej3mr0ej3mr0e.png">
    <link rel="apple-touch-icon" sizes="152x152" href="https://i.ibb.co/dH9BrtY/Gemini-Generated-Image-mr0ej3mr0ej3mr0e.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://i.ibb.co/dH9BrtY/Gemini-Generated-Image-mr0ej3mr0ej3mr0e.png">
   
    
    <meta name="apple-mobile-web-app-title" content="คำนวณราคาทอง">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }
        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 480px;
            width: 100%;
            border-top: 8px solid #d4af37;
        }
        .logo-wrapper {
            text-align: center;
            margin-bottom: 15px;
        }
        .logo-img {
            width: 85px;
            height: 85px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #d4af37;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
            margin: 0 0 5px 0;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-weight: 400;
        }
        .optional-label {
            font-size: 12px;
            color: #888;
            font-style: italic;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="number"]:focus {
            border-color: #d4af37;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #d4af37;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #aa8c2c;
        }
        .btn-secondary {
            background-color: #4a5568;
            font-size: 16px;
            padding: 10px;
        }
        .btn-secondary:hover {
            background-color: #2d3748;
        }
        .result-box {
            margin-top: 25px;
            padding: 18px;
            background-color: #fbf8eb;
            border-left: 5px solid #d4af37;
            border-radius: 4px;
            display: none;
        }
        .k-result-box {
            margin-top: 12px;
            padding: 12px;
            background-color: #f0f4f8;
            border-left: 5px solid #4a5568;
            border-radius: 4px;
            display: none;
        }
        .result-item {
            margin: 8px 0;
            font-size: 16px;
            color: #444;
        }
        .highlight {
            color: #d4af37;
            font-weight: 600;
        }
        .k-highlight {
            color: #2b6cb0;
            font-weight: 600;
        }
        .profit-highlight {
            color: #2e7d32;
            font-weight: 600;
        }
        .total-price-section {
            font-size: 18px;
            border-top: 1px dashed #d4af37;
            padding-top: 10px;
            margin-top: 12px;
            display: none;
        }
        .profit-section {
            font-size: 18px;
            border-top: 1px dashed #2e7d32;
            padding-top: 10px;
            margin-top: 12px;
            display: none;
        }
        hr {
            border: 0;
            height: 1px;
            background: #e2e8f0;
            margin: 25px 0;
        }
        .tools-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-wrapper">
        <img src="https://i.ibb.co/dH9BrtY/Gemini-Generated-Image-mr0ej3mr0ej3mr0e.png" alt="Logo" class="logo-img">
    </div>
    <h2>โปรแกรมคำนวณราคาทองคำ</h2>
    <p class="subtitle">คำนวณราคาต่อกรัม วิเคราะห์ต้นทุนและราคารวม</p>
    
    <div class="form-group">
        <label for="goldBars">1. ราคาซื้อทองแท่งปัจจุบัน (บาท):</label>
        <input type="number" id="goldBars" placeholder="ตัวอย่าง: 44000" required>
    </div>
    
    <div class="form-group">
        <label for="percentGold">2. ความบริสุทธิ์ของทอง (%):</label>
        <input type="number" id="percentGold" placeholder="ตัวอย่าง: 75" step="0.01" required>
    </div>

    <div class="form-group">
        <label for="goldWeight">3. น้ำหนักทอง (กรัม) <span class="optional-label">(ไม่จำเป็นต้องระบุก็ได้)</span> <span>:</span></label>
        <input type="number" id="goldWeight" placeholder="ตัวอย่าง: 15.2 (ปล่อยว่างไว้ได้)" step="0.0001">
    </div>

    <div class="form-group">
        <label for="myBuyPrice">4. ราคาที่คุณซื้อทองชิ้นนี้มา (บาท) <span class="optional-label">(ไม่จำเป็นต้องระบุก็ได้)</span> <span>:</span></label>
        <input type="number" id="myBuyPrice" placeholder="ตัวอย่าง: 25000 (ปล่อยว่างไว้ได้)">
    </div>
    
    <button onclick="calculateGold()">คำนวณราคาทอง</button>
    
    <div class="result-box" id="resultBox">
        <div class="result-item" id="infoText"></div>
        <div class="result-item" style="margin-top: 12px;">ราคาทองคำต่อกรัมวันนี้: <span class="highlight" id="pricePerGram">0</span> บาท</div>
        
        <div class="result-item total-price-section" id="totalPriceSection">
            ราคารวมของทองน้ำหนัก <span id="viewWeight">0</span> กรัม คือ: <span class="highlight" id="totalPrice">0</span> บาท
        </div>

        <div class="result-item profit-section" id="profitSection">
            ทองชิ้นนี้ต้องมีน้ำหนักเกิน: <span class="profit-highlight" id="minWeightForProfit">0</span> กรัม ถึงจะเริ่มได้กำไร
        </div>
    </div>

    <hr>

    <div class="tools-title">เครื่องมือแปลงหน่วยทอง (K-Gold Tools)</div>

    <div class="form-group">
        <label for="goldKValue">5. แปลงค่าทอง (K) เป็นเปอร์เซ็นต์ (%):</label>
        <input type="number" id="goldKValue" placeholder="ตัวอย่าง: 18 หรือ 22" step="0.1">
    </div>
    <button onclick="convertKToPercent()" class="btn-secondary" style="margin-bottom: 20px;">แปลงค่า K เป็นเปอร์เซ็นต์</button>

    <div class="k-result-box" id="kResultBox">
        <div class="result-item">ทองคำขนาด <span class="k-highlight" id="viewKValue">0</span>K คิดเป็น: <span class="k-highlight" id="calculatedPercent">0</span>%</div>
    </div>

    <div class="form-group" style="margin-top: 20px;">
        <label for="goldPercentValue">6. แปลงเปอร์เซ็นต์ (%) เป็นค่าทอง (K):</label>
        <input type="number" id="goldPercentValue" placeholder="ตัวอย่าง: 75 หรือ 96.5" step="0.01">
    </div>
    <button onclick="convertPercentToK()" class="btn-secondary">แปลงเปอร์เซ็นต์เป็นค่า K</button>

    <div class="k-result-box" id="percentResultBox">
        <div class="result-item">ทองคำบริสุทธิ์ <span class="k-highlight" id="viewPercentValue">0</span>% คิดเป็น: <span class="k-highlight" id="calculatedKValue">0</span>K</div>
    </div>
</div>

<script>
    function calculateGold() {
        const valueOfGoldbars = parseFloat(document.getElementById('goldBars').value);
        const percentOfGold = parseFloat(document.getElementById('percentGold').value);
        const goldWeightInput = document.getElementById('goldWeight').value;
        const myBuyPriceInput = document.getElementById('myBuyPrice').value;
        
        if (isNaN(valueOfGoldbars) || isNaN(percentOfGold)) {
            alert('กรุณากรอกราคาซื้อทองแท่งและความบริสุทธิ์ให้ครบถ้วนครับ');
            return;
        }
        
        const pricePerGram = ((valueOfGoldbars - 200) / 15.2) * (percentOfGold / 100);
        
        document.getElementById('infoText').innerHTML = `✨ บันทึกข้อมูลเรียบร้อย! ทองคำบริสุทธิ์ <b>${percentOfGold}%</b>`;
        document.getElementById('pricePerGram').innerText = pricePerGram.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        
        if (goldWeightInput !== "" && !isNaN(parseFloat(goldWeightInput)) && parseFloat(goldWeightInput) > 0) {
            const goldWeight = parseFloat(goldWeightInput);
            const totalPrice = pricePerGram * goldWeight;
            
            document.getElementById('viewWeight').innerText = goldWeight;
            document.getElementById('totalPrice').innerText = totalPrice.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            document.getElementById('totalPriceSection').style.display = 'block';
        } else {
            document.getElementById('totalPriceSection').style.display = 'none';
        }
        
        if (myBuyPriceInput !== "" && !isNaN(parseFloat(myBuyPriceInput)) && parseFloat(myBuyPriceInput) > 0) {
            const myBuyPrice = parseFloat(myBuyPriceInput);
            const minWeight = myBuyPrice / pricePerGram;
            
            document.getElementById('minWeightForProfit').innerText = minWeight.toFixed(4);
            document.getElementById('profitSection').style.display = 'block';
        } else {
            document.getElementById('profitSection').style.display = 'none';
        }
            
        document.getElementById('resultBox').style.display = 'block';
    }

    // ฟังก์ชันข้อ 5: แปลงค่าทอง K เป็นเปอร์เซ็นต์
    function convertKToPercent() {
        const kValueInput = document.getElementById('goldKValue').value;
        const kValue = parseFloat(kValueInput);

        if (isNaN(kValue) || kValue <= 0 || kValue > 24) {
            alert('กรุณากรอกจำนวน K ให้ถูกต้อง (ตั้งแต่ 1 ถึง 24 K) ครับ');
            return;
        }

        const computedPercent = (kValue / 24) * 100;

        document.getElementById('viewKValue').innerText = kValue;
        document.getElementById('calculatedPercent').innerText = computedPercent.toFixed(2);
        
        // ช่วยผู้ใช้พิมพ์อัตโนมัติ: ส่งค่าที่คำนวณได้ไปที่ช่องเลข 2
        document.getElementById('percentGold').value = computedPercent.toFixed(2);
        
        document.getElementById('kResultBox').style.display = 'block';
    }

    // ฟังก์ชันข้อ 6: แปลงเปอร์เซ็นต์ เป็นค่าทอง K
    function convertPercentToK() {
        const percentInput = document.getElementById('goldPercentValue').value;
        const percentValue = parseFloat(percentInput);

        if (isNaN(percentValue) || percentValue <= 0 || percentValue > 100) {
            alert('กรุณากรอกเปอร์เซ็นต์ให้ถูกต้อง (ตั้งแต่ 1 ถึง 100%) ครับ');
            return;
        }

        // ใช้สูตร (เปอร์เซ็นต์ที่สนใจ / 100) * 24
        const computedK = (percentValue / 100) * 24;

        document.getElementById('viewPercentValue').innerText = percentValue;
        // แสดงผลลัพธ์เป็นทศนิยม 2 ตำแหน่ง
        document.getElementById('calculatedKValue').innerText = computedK.toFixed(2);
        
        // ช่วยผู้ใช้พิมพ์อัตโนมัติ: ส่งค่าเปอร์เซ็นต์นี้ไปที่ช่องเลข 2 ให้ทันทีด้วยเพื่อความสะดวกในการคำนวณราคาต่อ
        document.getElementById('percentGold').value = percentValue;

        document.getElementById('percentResultBox').style.display = 'block';
    }
</script>

</body>
</html>
